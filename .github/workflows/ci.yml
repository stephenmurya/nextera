name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build
        env:
          WORDPRESS_GRAPHQL_URL: https://example.com/graphql
          WORDPRESS_PREVIEW_SECRET: preview-secret
          WORDPRESS_PREVIEW_AUTH_TOKEN: preview-auth-token
          NEXT_PUBLIC_SITE_URL: https://example.com
          REVALIDATION_SECRET: revalidation-secret
          HUBSPOT_PORTAL_ID: portal-id
          HUBSPOT_PRIVATE_APP_TOKEN: private-token
          HUBSPOT_FORM_GUID_DEMO: demo-guid
          HUBSPOT_FORM_GUID_WAITLIST: waitlist-guid
          HUBSPOT_FORM_GUID_CONTACT: contact-guid
